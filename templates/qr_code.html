{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">QR Code for {{ vendor.shop_name }}</h3>
            </div>
            <div class="card-body text-center">
                <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code" class="img-fluid mb-3">
                <p>Show this QR code to customers for payments</p>
                <button onclick="window.print()" class="btn btn-primary">Print QR Code</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
